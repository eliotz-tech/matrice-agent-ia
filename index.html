async function loadFromGSheet() {
  if (!GSHEET_CSV_URL) return null;
  // Appel direct — pas besoin de proxy, Apps Script gère le CORS nativement
  const r = await fetch(GSHEET_CSV_URL);
  if (!r.ok) throw new Error("Apps Script inaccessible (HTTP " + r.status + ")");
  const rows = await r.json(); // tableau d'objets [{ID, Nom, Type, VA, CX}, ...]
  const updates = {};
  for (const row of rows) {
    // Accepte les clés avec différentes casses (ID/id, VA/va, CX/cx)
    const id = parseInt(row["ID"] || row["id"]);
    const va = parseFloat(row["VA (1.0–4.0)"] || row["VA"] || row["va"]);
    const cx = parseFloat(row["CX (1.0–4.0)"] || row["CX"] || row["cx"]);
    if (!isNaN(id) && !isNaN(va) && !isNaN(cx) && va >= 1 && va <= 4 && cx >= 1 && cx <= 4) {
      updates[id] = { va: +va.toFixed(1), cx: +cx.toFixed(1) };
    }
  }
  return Object.keys(updates).length > 0 ? updates : null;
}

// Champs gérés par chaque source — séparation stricte
const JSONBIN_FIELDS = ["reel", "cas", "logo"];   // JSONBin : annotations utilisateur
const GSHEET_FIELDS  = ["va", "cx"];              // Google Sheets : scores uniquement

// Fusionne les 3 couches dans l'ordre : INIT → JSONBin → GSheet
// GSheet a priorité sur les scores, JSONBin ne touche jamais va/cx
function buildAgents(jbSaved, gsUpdates) {
  return AGENTS_INIT.map(a => {
    const result = Object.assign({}, a);
    // Couche 1 — JSONBin : reel, cas, logo
    if (jbSaved) {
      const s = jbSaved[a.id];
      if (s) JSONBIN_FIELDS.forEach(f => { if (s[f] !== undefined) result[f] = s[f]; });
    }
    // Couche 2 — Google Sheets : va, cx (priorité maximale)
    if (gsUpdates) {
      const g = gsUpdates[a.id];
      if (g) GSHEET_FIELDS.forEach(f => { if (g[f] !== undefined) result[f] = g[f]; });
    }
    return result;
  });
}

// Pour JSONBin : ne persiste QUE les champs annotations (jamais va/cx qui viennent du Sheet)
function extractPersistedData(agents) {
  return agents.map(a => {
    const out = { id: a.id };
    JSONBIN_FIELDS.forEach(f => { out[f] = a[f] !== undefined ? a[f] : null; });
    return out;
  });
}

async function jbRead() {
  const r = await fetch(JSONBIN_BASE + "/latest", {
    headers: { "X-Master-Key": JSONBIN_API_KEY }
  });
  if (!r.ok) throw new Error("HTTP " + r.status + " lors de la lecture");
  const j = await r.json();
  return j.record;
}

async function jbWrite(data) {
  const r = await fetch(JSONBIN_BASE, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": JSONBIN_API_KEY,
      "X-Bin-Versioning": "false"
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error("HTTP " + r.status + " lors de la sauvegarde");
  return r.json();
}

function BarsCompare({ data }) {
  const H = 240, PADX = 24, PADY = 34, BW = 14, GAP = 22; const max = 4;
  const scaleY = v => PADY + (H - PADY*2) * (1 - v/max);
  const step = (BW*2 + 10) + GAP; const totalW = Math.max(680, PADX*2 + data.length * step);
  return (
    <svg viewBox={`0 0 ${totalW} ${H}`} style={{width:"100%",background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
      {[1,1.5,2,2.5,3,3.5,4].map(v => (
        <g key={v}><line x1={PADX} y1={scaleY(v)} x2={totalW-PADX} y2={scaleY(v)} stroke="#e2e8f0" strokeWidth={1}/><text x={8} y={scaleY(v)} dominantBaseline="middle" fontSize={9} fill="#94a3b8">{v.toFixed(1)}</text></g>
      ))}
      {data.map((d, i) => { const x = PADX + i*step; const vaY = scaleY(d.va), cxY = scaleY(d.cx); const base = H - PADY; return (
        <g key={d.label}>
          <rect x={x} y={vaY} width={BW} height={Math.max(2, base - vaY)} fill="#f59e0b" rx="6" style={{transition:"all .4s ease"}}/>
          <circle cx={x+BW/2} cy={vaY} r={4} fill="#f59e0b" opacity="0.95"/>
          <text x={x+BW/2} y={vaY-6} textAnchor="middle" fontSize={9} fill="#d97706" fontWeight="700">{d.va.toFixed(1)}</text>
          <rect x={x+BW+10} y={cxY} width={BW} height={Math.max(2, base - cxY)} fill="#06b6d4" rx="6" style={{transition:"all .4s ease .05s"}}/>
          <circle cx={x+BW+10+BW/2} cy={cxY} r={4} fill="#06b6d4" opacity="0.95"/>
          <text x={x+BW+10+BW/2} y={cxY-6} textAnchor="middle" fontSize={9} fill="#0891b2" fontWeight="700">{d.cx.toFixed(1)}</text>
          <text x={x+BW+5} y={H-8} textAnchor="middle" fontSize={9.5} fill="#475569">{d.label}</text>
        </g>
      ); })}
      <g>
        <rect x={totalW-186} y={10} width={10} height={10} fill="#f59e0b" rx="2"/>
        <text x={totalW-170} y={18} fontSize={10.5} fill="#64748b">Valeur ajoutée</text>
        <rect x={totalW-186} y={28} width={10} height={10} fill="#06b6d4" rx="2"/>
        <text x={totalW-170} y={36} fontSize={10.5} fill="#64748b">Complexité</text>
      </g>
    </svg>
  );
}

function App() {
  const [agents, setAgents] = useState(AGENTS_INIT);
  const [tab, setTab] = useState("matrix");

  // ─── PERSISTANCE JSONBIN ────────────────────────────────────────────────────
  const [syncStatus, setSyncStatus] = useState("loading");
  const [syncMsg, setSyncMsg]       = useState("");
  const saveTimerRef = useRef(null);
  const latestAgents = useRef(null); // ref pour éviter les dépendances circulaires

  // État source active
  // Chargement initial : JSONBin + GSheet en parallèle, fusion propre
  useEffect(() => {
    setSyncStatus("loading");
    setSyncMsg("Chargement…");

    const pJb = jbRead()
      .then(record => {
        const arr = record && record.agents;
        if (!arr || !Array.isArray(arr) || arr.length === 0) return null;
        const map = {};
        arr.forEach(a => { map[a.id] = a; });
        return map; // { id: { reel, cas, logo } }
      })
      .catch(() => null); // JSONBin non bloquant

    const pGs = GSHEET_CSV_URL
      ? loadFromGSheet().catch(() => null)
      : Promise.resolve(null);

    Promise.all([pJb, pGs]).then(([jbMap, gsMap]) => {
      const merged = buildAgents(jbMap, gsMap);
      setAgents(merged);
      latestAgents.current = merged;

      const parts = [];
      if (jbMap)  parts.push("annotations JSONBin");
      if (gsMap)  parts.push("scores Google Sheets");
      if (!jbMap && !gsMap) parts.push("données par défaut");
      setSyncMsg("Chargé — " + parts.join(" + "));
      setSyncStatus("idle");
    });
  }, []);

  // Rechargement manuel des scores depuis GSheet (ne touche pas reel/cas/logo)
  const reloadFromGSheet = () => {
    if (!GSHEET_CSV_URL) return;
    setSyncStatus("loading");
    setSyncMsg("Actualisation scores depuis Google Sheets…");
    loadFromGSheet()
      .then(gsMap => {
        if (gsMap && Object.keys(gsMap).length > 0) {
          setAgents(prev => {
            const next = prev.map(a => {
              const g = gsMap[a.id];
              return g ? {...a, ...g} : a; // écrase seulement va/cx
            });
            latestAgents.current = next;
            return next;
          });
          setSyncMsg("Scores actualisés — " + new Date().toLocaleTimeString('fr-FR'));
        } else {
          setSyncMsg("Aucune donnée trouvée dans le Sheet");
        }
        setSyncStatus("idle");
      })
      .catch(err => { setSyncStatus("error"); setSyncMsg("Erreur : " + err.message); });
  };

  // Sauvegarde debounce 1.5s
  const scheduleSave = useCallback((newAgents) => {
    latestAgents.current = newAgents;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSyncStatus("saving");
    setSyncMsg("En attente…");
    saveTimerRef.current = setTimeout(() => {
      const payload = { agents: extractPersistedData(latestAgents.current) };
      jbWrite(payload)
        .then(() => {
          setSyncStatus("saved");
          setSyncMsg("Sauvegardé à " + new Date().toLocaleTimeString('fr-FR'));
          setTimeout(() => setSyncStatus(s => s === "saved" ? "idle" : s), 3000);
        })
        .catch(err => {
          setSyncStatus("error");
          setSyncMsg("Erreur sauvegarde : " + err.message);
        });
    }, 1500);
  }, []);
  // ────────────────────────────────────────────────────────────────────────────
  const [selectedIds, setSelectedIds] = useState([]);
  const [focusedIdx, setFocusedIdx] = useState(0);
  const [selectionLimitMsg, setSelectionLimitMsg] = useState("");
  const [filterReel, setFilterReel] = useState("Tous");
  const [topCat, setTopCat] = useState("Tous");
  const [topType, setTopType] = useState("Tous");
  const [showNames, setShowNames] = useState(false);
  const [labelSide, setLabelSide] = useState("auto");
  const [matrixSort, setMatrixSort] = useState("none");
  const [fId, setFId] = useState(""); const [fName, setFName] = useState("");
  const [fCat, setFCat] = useState("Tous"); const [fType, setFType] = useState("Tous");

  const [fQuad, setFQuad] = useState("Tous"); const [sortCol,setSortCol]= useState("priority"); const [sortDir,setSortDir]= useState(1);
  const [compare, setCompare] = useState([]); const [compareSort, setCompareSort] = useState("priority");

      return next;
    });

  const toggleReel = useCallback(id => {

  const toggleCompare = useCallback(id => { setCompare(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]); }, []);

  const toggleSelectId = (id) => { setSelectedIds(prev => { const exists = prev.includes(id); if (!exists && prev.length >= 6) { setSelectionLimitMsg("Limite de 6 fiches atteinte"); clearTimeout(toggleSelectId._t); toggleSelectId._t = setTimeout(()=>setSelectionLimitMsg(""), 2200); return prev; } const next = exists ? prev.filter(x=>x!==id) : [...prev, id]; const idx = next.indexOf(id); setFocusedIdx(idx>=0?idx:0); return next; }); };

  const allTypes = useMemo(() => Array.from(new Set(agents.map(a=>a.type))).sort((a,b)=>a.localeCompare(b,'fr')), [agents]);

  const applyTopFilters = useCallback(list => {
    let out = [...list];
    if (topCat !== "Tous") out = out.filter(a => a.categorie === topCat);
    if (topType !== "Tous") out = out.filter(a => a.type === topType);
    return out;
  }, [topCat, topType]);

  const applyReelFilter = useCallback(list => {
    if (filterReel==="Réel") return list.filter(a=>a.reel);
    if (filterReel==="Fictif") return list.filter(a=>!a.reel);
    return list;
  }, [filterReel]);

  const matrixAgents = useMemo(() => {
    let list = applyTopFilters(applyReelFilter(agents));
    const collator = new Intl.Collator('fr');
    const catOrder = ["Assurance","IT","People"];
    if (matrixSort!=="none") {
      list = [...list].sort((a,b)=>{
        if (matrixSort==="cat") return (catOrder.indexOf(a.categorie)-catOrder.indexOf(b.categorie)) || collator.compare(a.name,b.name);
        if (matrixSort==="type") return collator.compare(a.type,b.type) || collator.compare(a.name,b.name);
        if (matrixSort==="id")  return a.id - b.id;
        if (matrixSort==="va")  return b.va - a.va;
        if (matrixSort==="cx")  return a.cx - b.cx;
        return 0;
      });
    }
    return list;
  }, [agents, applyTopFilters, applyReelFilter, matrixSort]);

  const listAgents = useMemo(() => {
    let list = applyTopFilters(applyReelFilter([...agents]));
    if (fId.trim()) list = list.filter(a=>String(a.id).includes(fId.trim()));

    if (fVaMin!=="") list = list.filter(a=>a.va>=parseFloat(fVaMin));
    if (fVaMax!=="") list = list.filter(a=>a.va<=parseFloat(fVaMax));

    if (fCxMax!=="") list = list.filter(a=>a.cx<=parseFloat(fCxMax));
    if (fQuad!=="Tous"){const qi=QUADRANTS.findIndex(q=>q.label===fQuad); if(qi>=0)list=list.filter(a=>getQ(a.va,a.cx)===qi);} 
    list.sort((a,b)=>{ let av,bv; if(sortCol==="priority"){const qa=getQ(a.va,a.cx),qb=getQ(b.va,b.cx);av=qa!==qb?qa:-(a.va/a.cx);bv=qa!==qb?qb:-(b.va/b.cx);} else if(sortCol==="id") {av=a.id;bv=b.id;} else if(sortCol==="va") {av=a.va;bv=b.va;} else if(sortCol==="cx") {av=a.cx;bv=b.cx;} else if(sortCol==="name"){av=a.name;bv=b.name;} else if(sortCol==="cat") {av=a.categorie;bv=b.categorie;} else if(sortCol==="type"){av=a.type;bv=b.type;} if(av<bv)return -1*sortDir; if(av>bv)return 1*sortDir; return 0; });
    return list;
  }, [agents, applyTopFilters, applyReelFilter, fId,fName,fCat,fType,fVaMin,fVaMax,fCxMin,fCxMax,fQuad,sortCol,sortDir]);

  const sortIcon = col => sortCol===col?(sortDir===1?"↑":"↓"):"⇅";
  const toggleSort = col => { if(sortCol===col)setSortDir(d=>-d); else{setSortCol(col);setSortDir(1);} };

  const kpiCounts = QUADRANTS.map((_,i)=>applyTopFilters(applyReelFilter(agents)).filter(a=>getQ(a.va,a.cx)===i).length);

  const PAD=44, PW=660, PH=520, R=9, JR=15; const VW=PAD*2+PW, VH=PAD*2+PH+12;

  const jittered = useMemo(() => {
    const pts = matrixAgents.map(a=>({...a, rx:PAD+((a.cx-1)/3)*PW, ry:PAD+((4-a.va)/3)*PH }));
    return pts.map((p,i)=>{ let jx=0,jy=0; pts.forEach((q,j)=>{ if(i===j)return; const dx=p.rx-q.rx,dy=p.ry-q.ry,dist=Math.sqrt(dx*dx+dy*dy); if(dist<JR&&dist>0){const push=(JR-dist)/2;jx+=(dx/dist)*push;jy+=(dy/dist)*push;} }); return {...p,px:Math.max(PAD+R,Math.min(PAD+PW-R,p.rx+jx)),py:Math.max(PAD+R,Math.min(PAD+PH-R,p.ry+jy))}; });
  },[matrixAgents]);

  const labelLayout = useMemo(() => {
    if (!showNames) return new Map();
    const pillH = 14, maxW = 96; const minX = PAD, maxX = PAD+PW; const minY = PAD, maxY = PAD+PH;
    const labels = jittered.map(a => { const nameClean = cleanName(a.name); const short = nameClean.length>20 ? nameClean.slice(0,19)+"…" : nameClean; const dotR = selectedIds.includes(a.id) ? R+3 : R; const side = (labelSide!=="auto")?labelSide: ((a.px > PAD + PW*0.6) ? "gauche" : "droite"); const w = Math.min(short.length * 5.2 + dotR*2 + 10, maxW); let x = side==="droite" ? (a.px + dotR + 2) : (a.px - dotR - 2 - w); let y = a.py - pillH/2; if (x + w > maxX) x = a.px - dotR - 2 - w; if (x < minX) x = a.px + dotR + 2; return { id:a.id, x, y, w, h:pillH, text:short, color:dc(a) }; });
    for (let iter=0; iter<12; iter++) {
      for (let i=0;i<labels.length;i++){
        for (let j=i+1;j<labels.length;j++){
          const A=labels[i], B=labels[j]; if (!A || !B) continue;
          const ax1=A.x, ax2=A.x+A.w, ay1=A.y, ay2=A.y+A.h; const bx1=B.x, bx2=B.x+B.w, by1=B.y, by2=B.y+B.h;
          if (ax1<bx2 && ax2>bx1 && ay1<by2 && ay2>by1) {
            const overlapY = Math.min(ay2,by2) - Math.max(ay1,by1); const sep = (overlapY/2)+1; if ((A.y+B.y)/2 < (minY+maxY)/2) { A.y -= sep; B.y += sep; } else { A.y += sep; B.y -= sep; }
            A.y = Math.max(minY, Math.min(maxY-A.h, A.y)); B.y = Math.max(minY, Math.min(maxY-B.h, B.y));

          </div>

                    <td style={{padding:"10px 12px",fontSize:11,color:"#cbd5e1",fontWeight:600,textAlign:"center"}}>{agent.id}</td>
                    <td style={{padding:"10px 16px"}}><div style={{fontSize:12,fontWeight:600,color:"#1e293b"}}>{agent.name}</div></td>
                    <td style={{padding:"10px 12px",textAlign:"center"}}><span style={{padding:"2px 8px",borderRadius:99,fontSize:9,fontWeight:700,background:color+"18",color}}>{agent.categorie}</span></td>
                    <td style={{padding:"10px 12px",fontSize:10,color:"#94a3b8",textAlign:"center"}}>{agent.type}</td>
                    <td style={{padding:"10px 12px",textAlign:"center"}} onClick={e=>{e.stopPropagation();toggleReel(agent.id);}}><span style={{fontSize:16,cursor:"pointer",userSelect:"none"}} title="Cliquer pour basculer">{agent.reel?"✅":"☐"}</span></td>
                    <td style={{padding:"10px 8px",textAlign:"center"}}><span style={{fontSize:13,fontWeight:800,color:"#d97706"}}>{fmt(agent.va)}</span></td>
                    <td style={{padding:"10px 8px",textAlign:"center"}}><span style={{fontSize:13,fontWeight:800,color:"#0891b2"}}>{fmt(agent.cx)}</span></td>
                    <td style={{padding:"10px 12px",textAlign:"center"}}><div style={{padding:"3px 8px",borderRadius:8,background:q.bg,border:`1px solid ${q.border}`,fontSize:9,fontWeight:700,color:q.text,whiteSpace:"nowrap"}}>{q.label}</div></td>
                    <td style={{padding:"10px 12px",textAlign:"center"}} onClick={e=>e.stopPropagation()}>
                      <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center"}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                          <span style={{fontSize:8,color:"#d97706",fontWeight:700}}>VA</span>
                          <input type="number" min="1.0" max="4.0" step="0.1" defaultValue={fmt(agent.va)} className="score-input" onBlur={e=>updateAgent(agent.id,'va',parseFloat(e.target.value))}/>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                          <span style={{fontSize:8,color:"#0891b2",fontWeight:700}}>CX</span>
                          <input type="number" min="1.0" max="4.0" step="0.1" defaultValue={fmt(agent.cx)} className="score-input" onBlur={e=>updateAgent(agent.id,'cx',parseFloat(e.target.value))}/>
                        </div>
                      </div>
                    </td>
                  </tr>
                ); })}
              </tbody>
            </table>
            {listAgents.length===0&&(<div style={{padding:"40px",textAlign:"center",color:"#94a3b8",fontSize:13}}>Aucun agent ne correspond aux filtres sélectionnés.</div>)}
          </div>
        </div>
      )}

      {tab==="compare" && (
        <div style={{padding:"24px 32px",display:"flex",flexDirection:"column",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{padding:"6px 12px",borderRadius:10, background:"#f8fafc", border:"1px solid #e2e8f0", fontSize:12, fontWeight:700, color:"#475569"}}>Comparer</div>
            <span style={{fontSize:12,color:"#64748b"}}>Sélectionnés : <strong>{compare.length}</strong></span>
            <div style={{display:"inline-flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
              <label style={{fontSize:11,color:"#64748b"}}>Trier par</label>
              <select className="filter-input" value={compareSort} onChange={e=>setCompareSort(e.target.value)}>
                <option value="priority">Priorité (VA/CX) ↓</option>
                <option value="va">VA ↓</option>
                <option value="cx">CX ↑</option>
                <option value="cat">Catégorie A→Z</option>
                <option value="name">Nom A→Z</option>
              </select>
              <button className="btn" onClick={()=>setTab("list")} title="Ajouter d'autres agents">+ Ajouter</button>
              <button className="btn danger" onClick={clearCompare}>Vider</button>
            </div>
          </div>
          {compare.length===0 ? (
            <div className="card" style={{padding:24,color:"#64748b"}}>Utilisez les cases à cocher (onglet <strong>Liste</strong>) ou le bouton dans une fiche pour ajouter des agents à comparer.</div>
          ) : (
            <>
              <div className="card" style={{padding:12}}>
                <BarsCompare data={applyTopFilters(agents).filter(a=>compare.includes(a.id)).map(a=>({ label: shortNameFor(a.name, 18), va:a.va, cx:a.cx, color:dc(a) }))}/>
              </div>
              <div className="card" style={{overflowX:"auto"}}>
                <table style={{borderCollapse:"collapse",width:"100%"}}>
                  <thead>
                    <tr>
                      <th style={{padding:"12px",fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em",color:"#94a3b8",textAlign:"left"}}>Attribut</th>
                      {applyTopFilters(agents).filter(a=>compare.includes(a.id)).map(a=> (
                        <th key={a.id} style={{padding:"12px",textAlign:"left",minWidth:220}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{width:8,height:8,borderRadius:"50%",background:dc(a)}}/>
                            <div style={{display:"flex",flexDirection:"column"}}>
                              <div style={{fontSize:12,fontWeight:800,color:"#111827"}}>{a.name}</div>
                              <div style={{fontSize:10,color:"#94a3b8"}}>{a.categorie} · {a.type}</div>
                            </div>
                            <button className="btn" style={{marginLeft:"auto"}} onClick={()=>setCompare(prev=>prev.filter(id=>id!==a.id))}>Retirer</button>
                          </div>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[ {k:"Réel", render:a=> a.reel?"✅ Oui":"☐ Non"}, {k:"Valeur ajoutée (VA)", render:a=> fmt(a.va)}, {k:"Complexité (CX)", render:a=> fmt(a.cx)}, {k:"Priorité (VA/CX)", render:a=> (a.va/a.cx).toFixed(2)}, {k:"Quadrant", render:a=> QUADRANTS[getQ(a.va,a.cx)].label}, {k:"Nuance VA", render:a=> a.nuance_va}, {k:"Nuance CX", render:a=> a.nuance_cx}, {k:"Cas associé(s)", render:a=> a.cas ? a.cas.split(/\s+/).map((w,i)=> w.startsWith("http") ? <div key={i}><a href={w} target="_blank" rel="noreferrer" style={{color:'#4f46e5',textDecoration:'none'}}>{w}</a></div> : <div key={i} style={{color:'#64748b'}}>{w}</div>) : <span style={{color:'#94a3b8'}}>—</span>}, ].map(row => (
                      <tr key={row.k}>
                        <td style={{padding:"10px 12px",fontSize:12,color:"#64748b",background:"#f8fafc",borderTop:"1px solid #f1f5f9"}}>{row.k}</td>
                        {applyTopFilters(agents).filter(a=>compare.includes(a.id)).map(a=> (<td key={a.id+row.k} style={{padding:"10px 12px",borderTop:"1px solid #f1f5f9",verticalAlign:"top"}}>{row.render(a)}</td>))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>
          )}
        </div>
      )}

      {compare.length>0 && (
        <div className="compare-bar">
          <span style={{fontSize:12}}>Comparer <strong>{compare.length}</strong> agent{compare.length>1?"s":""}</span>
          <button className="btn" onClick={()=>setTab("compare")}>Ouvrir</button>
          <button className="btn danger" onClick={clearCompare}>Vider</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
